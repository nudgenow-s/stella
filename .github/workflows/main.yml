name: Stella Quantum Radar Final

on:
  schedule:
    - cron: '30 7 * * *' # 北京时间 15:30 自动扫A股与基因
    - cron: '*/30 * * * *' # 每30分钟扫一次币圈（GitHub免费额度限制）
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10' 
      - name: Install 
        run: |
          python -m pip install --upgrade pip
          pip install akshare ccxt pandas
          pip install git+https://github.com/twopirllc/pandas-ta.git  # 强制从源码安装，解决找不到包的问题


      - name: Run
        run: python stella_radar.py  # 确保你的 Python 文件名真的是这个！

      - name: Deploy
        run: |
          git config --global user.name "Stella-Bot"
          git config --global user.email "stella-bot@users.noreply.github.com"
          git add index.html
          git commit -m "Radar Insight Update: $(date)" || exit 0
          git push origin main
