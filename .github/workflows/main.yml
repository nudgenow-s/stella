name: Stella Quantum Radar Final

on:
  schedule:
    - cron: '30 7 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11' # 强制升级 Python 到 3.11

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas==2.2.2 # 锁定稳定的 pandas 版本
          pip install akshare ccxt pandas-ta # 这次环境一致了，不会再报错
          
      - name: Run Radar
        run: python stella_radar.py
        
      - name: Deploy
        run: |
          git config --global user.name "Stella-Bot"
          git config --global user.email "stella-bot@users.noreply.github.com"
          git add index.html
          git commit -m "Auto-update Radar: $(date)" || exit 0
          git push origin main
